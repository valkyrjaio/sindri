name: Create a New Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

run-name: "Release ${{ inputs.bump }} bump on ${{ github.ref_name }}"

permissions:
  contents: write

jobs:
  check-version:
    uses: valkyrjaio/.github/.github/workflows/_get-version-for-release.yml@master
    secrets: inherit
    with:
      bump: ${{ inputs.bump }}

  check-outdated-dependencies:
    needs: check-version
    uses: valkyrjaio/.github/.github/workflows/_check-outdated-php-dependencies.yml@master
    secrets: inherit
    with:
      php-version: '8.4'
      dependencies: |
        [
          {"name": "Root Packages",    "command": "root-outdated-check"},
          {"name": "PHPArkitect",      "command": "phparkitect-outdated-check"},
          {"name": "PHP Code Sniffer", "command": "phpcodesniffer-outdated-check"},
          {"name": "PHP CS Fixer",     "command": "phpcsfixer-outdated-check"},
          {"name": "PHPStan",          "command": "phpstan-outdated-check"},
          {"name": "PHPUnit",          "command": "phpunit-outdated-check"},
          {"name": "Psalm",            "command": "psalm-outdated-check"},
          {"name": "Rector",           "command": "rector-outdated-check"}
        ]

  update-version-files:
    needs: [check-outdated-dependencies, check-version]

    name: "Update version files for v${{ needs.check-version.outputs.version }}"

    runs-on: ubuntu-latest

    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VALKYRJA_GHA_APP_ID }}
          private-key: ${{ secrets.VALKYRJA_GHA_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Update VERSION.md
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          sed -i "s/.*/$VERSION/g" VERSION.md

      - name: Commit version change
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[Release] Update version for v${{ needs.check-version.outputs.version }} release"
          commit_user_name: ${{ steps.generate-token.outputs.app-slug }}[bot]
          commit_user_email: ${{ secrets.VALKYRJA_GHA_APP_ID }}+${{ steps.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com
          commit_author: ${{ steps.generate-token.outputs.app-slug }}[bot] <${{ secrets.VALKYRJA_GHA_APP_ID }}+${{ steps.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com>

  release:
    needs: [update-version-files, check-version]
    uses: valkyrjaio/.github/.github/workflows/_release.yml@master
    secrets: inherit
    with:
      version: ${{ needs.check-version.outputs.version }}
