name: Rebase to Master

on:
  workflow_dispatch:
    inputs:
      source-branch:
        description: 'Branch to rebase master onto. Defaults to the latest major version branch.'
        required: false
        type: string

run-name: "Rebase ${{ inputs.source-branch || 'latest major version branch' }} to master"

jobs:
  rebase:
    uses: valkyrjaio/.github/.github/workflows/_rebase-to-master.yml@master
    permissions:
      contents: write
    secrets: inherit
    with:
      source-branch: ${{ inputs.source-branch || '' }}
