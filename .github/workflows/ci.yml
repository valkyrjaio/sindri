name: CI

on:
  push:
    branches: [ 'master', '*.x' ]
  pull_request:
    branches: [ 'master', '*.x' ]

permissions:
  pull-requests: write
  contents: read

jobs:
  commit-message-check:
    name: Commit Message Check
    if: github.event_name == 'pull_request'
    uses: valkyrjaio/.github/.github/workflows/_commit-message-check.yml@2b626b4cd5090fb9d998ba35450775bfea79b21b
    secrets: inherit

  phparkitect:
    name: PHPArkitect
    uses: valkyrjaio/ci-phparkitect-php/.github/workflows/_workflow-call.yml@7544c1072fbfbc50496993cae3b78ed3f8faf268
    with:
      php-version: '8.4'
      paths: |
        ci:
          - '.github/ci/phparkitect/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/phparkitect/**'
          - '.github/workflows/ci.yml'
          - 'bin/valkyrja'
          - 'functions/**/*.php'
          - 'src/**/*.php'
          - 'tests/**/*.php'
          - 'composer.json'
    secrets: inherit

  phpcodesniffer:
    name: PHP Code Sniffer
    uses: valkyrjaio/ci-phpcodesniffer-php/.github/workflows/_workflow-call.yml@41eaf11b7713506377fbb4e83aebbca096792f49
    with:
      php-version: '8.4'
      paths: |
        ci:
          - '.github/ci/phpcodesniffer/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/phpcodesniffer/**'
          - '.github/workflows/ci.yml'
          - 'bin/valkyrja'
          - 'functions/**/*.php'
          - 'src/**/*.php'
          - 'tests/**/*.php'
          - 'composer.json'
    secrets: inherit

  phpcsfixer:
    name: PHP CS Fixer
    uses: valkyrjaio/ci-phpcsfixer-php/.github/workflows/_workflow-call.yml@e005d94ff60bf7eee383e88bb97d6a87dde5a0cd
    with:
      php-version: '8.4'
      paths: |
        ci:
          - '.github/ci/phpcsfixer/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/phpcsfixer/**'
          - '.github/workflows/ci.yml'
          - 'bin/valkyrja'
          - 'functions/**/*.php'
          - 'src/**/*.php'
          - 'tests/**/*.php'
          - 'composer.json'
    secrets: inherit

  phpstan:
    name: PHPStan
    uses: valkyrjaio/ci-phpstan-php/.github/workflows/_workflow-call.yml@f3b678de9c71620572278d9bc09030d5812f00c4
    with:
      php-version: '8.4'
      paths: |
        ci:
          - '.github/ci/phpstan/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/phpstan/**'
          - '.github/workflows/ci.yml'
          - 'bin/valkyrja'
          - 'functions/**/*.php'
          - 'src/**/*.php'
          - 'tests/**/*.php'
          - 'composer.json'
    secrets: inherit

  phpunit:
    name: PHPUnit
    uses: valkyrjaio/ci-phpunit-php/.github/workflows/_workflow-call.yml@da8fc9da6eafb90f3d9cdeb9b65a5ab3d35ab873
    with:
      php-versions: '["8.4", "8.5", "8.6"]'
      php-version-bleeding-edge: '8.6'
      extensions: 'mbstring, intl, sodium, fileinfo, pdo, php-mysql, php-sqlite3, php-pgsql, pdo_sqlite, pdo_pgsql, pdo_mysql xdebug'
      paths: |
        ci:
          - '.github/ci/phpunit/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/phpunit/**'
          - '.github/workflows/ci.yml'
          - 'bin/valkyrja'
          - 'functions/**/*.php'
          - 'src/**/*.php'
          - 'tests/**/*.php'
          - 'composer.json'
    secrets: inherit

  psalm:
    name: Psalm
    uses: valkyrjaio/ci-psalm-php/.github/workflows/_workflow-call.yml@1f216925b5ff78a88c1728d734cab165071b11c2
    with:
      php-version: '8.4'
      run-script: 'psalm-shepherd-with-stats'
      paths: |
        ci:
          - '.github/ci/psalm/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/psalm/**'
          - '.github/workflows/ci.yml'
          - 'bin/valkyrja'
          - 'functions/**/*.php'
          - 'src/**/*.php'
          - 'tests/**/*.php'
          - 'composer.json'
    secrets: inherit

  rector:
    name: Rector
    uses: valkyrjaio/ci-rector-php/.github/workflows/_workflow-call.yml@088293583eecdfc094660818a51b15a4699ba2ba
    with:
      php-version: '8.4'
      paths: |
        ci:
          - '.github/ci/rector/**'
          - '.github/workflows/ci.yml'
        files:
          - '.github/ci/rector/**'
          - '.github/workflows/ci.yml'
          - 'bin/valkyrja'
          - 'functions/**/*.php'
          - 'src/**/*.php'
          - 'tests/**/*.php'
          - 'composer.json'
    secrets: inherit
